site_name: Reestructuracio del modul DWES
site_description: Documentacio del redisseny del modul DWES per reptes, evidencies autentiques i IA verificable.
site_url: https://igomis.github.io/reestructuracioModul/
repo_url: https://github.com/igomis/reestructuracioModul
repo_name: igomis/reestructuracioModul
docs_dir: docs
site_dir: site
use_directory_urls: true

theme:
  name: readthedocs

plugins:
  - search

markdown_extensions:
  - tables
  - toc:
      permalink: true

nav:
  - Inici: index.md
  - Alumnat:
      - Inici alumnat: alumnat/index.md
      - Com funciona el curs: alumnat/com_funciona_el_curs.md
      - Com es valora: alumnat/com_es_valora.md
      - Com fer servir la IA: alumnat/com_fer_servir_la_ia.md
      - Projectes base: alumnat/projectes_base.md
      - Reptes:
          - Index: alumnat/reptes/index.md
          - Repte 1: alumnat/reptes/repte_01.md
          - Repte 2: alumnat/reptes/repte_02.md
          - Repte 3: alumnat/reptes/repte_03.md
          - Repte 4: alumnat/reptes/repte_04.md
          - Repte 5: alumnat/reptes/repte_05.md
  - Presentacions:
      - Visio del curs: 07_presentacions/presentacio_00_visio_curs.md
      - Repte 1: 07_presentacions/presentacio_01_repte_1.md
      - Repte 2: 07_presentacions/presentacio_02_repte_2.md
      - Repte 3: 07_presentacions/presentacio_03_repte_3.md
      - Repte 4: 07_presentacions/presentacio_04_repte_4.md
      - Repte 5: 07_presentacions/presentacio_05_repte_5.md
      - Avaluacio i defensa: 07_presentacions/presentacio_06_avaluacio_i_defensa.md
  - Index documental: 00_visio_general/index_documental.md
  - Visio general:
      - Presentacio breu: 00_visio_general/presentacio_model_dwes_reptes_ia.md
      - Resum executiu: 00_visio_general/resum_executiu_paquet_docent.md
      - Paquet docent exportable: 00_visio_general/paquet_docent_exportable.md
      - Versio prepilotatge v1: 00_visio_general/versio_prepilotatge_v1.md
      - Backlog de millores: 00_visio_general/backlog_millores_prepilotatge.md
      - Estat de produccio: 00_visio_general/issues_inicials.md
  - Programacio del modul:
      - Index: 01_programacio_modul/index.md
      - Pla d'implantacio docent: 01_programacio_modul/pla_implantacio_docent.md
      - Calendaritzacio per avaluacions: 01_programacio_modul/calendaritzacio_per_avaluacions.md
