      - Apunts reals:
          - Revisio transversal: 04_materials/apunts_reals/revisio_transversal_apunts_reals.md
          - Repte 1: 04_materials/apunts_reals/repte_01_kickoff_backend.md
          - Repte 2: 04_materials/apunts_reals/repte_02_sessions_i_autenticacio.md
          - Repte 3: 04_materials/apunts_reals/repte_03_mvc_i_persistencia.md
