  - Projecte i reptes:
      - Enunciat base: 05_projectes_tecnics/enunciat_projecte_base.md
      - Projecte base backend: 05_projectes_tecnics/projecte_base_backend.md
      - Integracio API: 05_projectes_tecnics/integracio_api.md
      - Integracio IA: 05_projectes_tecnics/integracio_ia.md
      - Integracio n8n: 05_projectes_tecnics/integracio_n8n.md
      - Repte 1: 02_reptes/repte_01_kickoff_backend.md
      - Repte 2: 02_reptes/repte_02_sessions_i_autenticacio.md
      - Repte 3: 02_reptes/repte_03_mvc_i_persistencia.md
      - Repte 4: 02_reptes/repte_04_api_i_consum.md
      - Repte 5: 02_reptes/repte_05_integracio_hibrida_n8n.md
  - Pilotatge i seguiment:
      - Pla de pilotatge real: 00_visio_general/pla_pilotatge_real.md
      - Pla d'execucio del pilotatge: 00_visio_general/pla_execucio_pilotatge_real.md
      - Seguiment de l'execucio: 00_visio_general/seguiment_execucio_pilotatge.md
