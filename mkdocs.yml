          - Setmanes 5-8: 01_programacio_modul/kit_pilotatge_setmanes_05_08.md
          - Setmanes 9-12: 01_programacio_modul/kit_pilotatge_setmanes_09_12.md
          - Setmanes 13-16: 01_programacio_modul/kit_pilotatge_setmanes_13_16.md
          - Setmanes 17-20: 01_programacio_modul/kit_pilotatge_setmanes_17_20.md
